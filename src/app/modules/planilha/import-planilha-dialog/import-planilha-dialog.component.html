<div fxLayout="column" fxLayoutAlign="center stretch" class="upload-container">
    <h2>Upload de Planilha</h2>

    <form fxLayout="column" fxLayoutGap="20px">
        <mat-form-field appearance="outline">
            <mat-label>Selecione o arquivo</mat-label>
            <input type="file" accept=".xlsx,.xls,.csv" matInput />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">Enviar</button>
    </form>
</div>
